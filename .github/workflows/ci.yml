name: CI

# MS_CI_STANDARD_BLOCK_START v1 — managed by SPECTER; do not hand-edit inside
on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.specify/**'
      - '.claude/**'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.specify/**'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
# MS_CI_STANDARD_BLOCK_END

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run CI checks
        run: uv run make -C .devcontainer -f Makefile ci

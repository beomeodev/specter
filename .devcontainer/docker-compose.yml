name: ${PROJECT_NAME}

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: unidev-py:3.14-${PROJECT_NAME}
    container_name: ${PROJECT_NAME}-app
    working_dir: /workspace/${PROJECT_NAME}
    tty: true
    stdin_open: true
    # Memory limits for Claude Code (requires 4GB+ Node.js heap)
    # Layer 1 (Docker): 8GB container limit
    # Layer 2 (Node.js): 4GB heap (set in Makefile:239 via NODE_OPTIONS)
    mem_limit: 8g
    memswap_limit: 8g
    env_file:
      - ../.env
    volumes:
      - ../:/workspace/${PROJECT_NAME}
      - ${HOME}/.codex:/home/dev/.codex
      - ${HOME}/.claude:/home/dev/.claude
      # Kimi Code CLI(kimi) 자격증명 영속화 (rebuild 후에도 로그인 유지).
      # kimi는 config/세션/로그를 ~/.kimi-code/ 에 저장한다 (KIMI_CODE_HOME로 변경 가능).
      # 호스트에 디렉터리 필요: mkdir -p ~/.kimi-code
      - ${HOME}/.kimi-code:/home/dev/.kimi-code
      # Antigravity CLI(agy) 자격증명 영속화 (rebuild 후에도 로그인 유지).
      # agy는 앱 디렉토리(자격증명 포함)를 ~/.gemini/antigravity-cli/에 만든다
      # (Gemini CLI 계승 경로) — ~/.config/agy가 아님. 호스트 1회 로그인이
      # 전 컨테이너에 공유되도록 ~/.gemini 전체를 마운트한다 (~/.codex와 동일 방식).
      # 주의: agy 업데이트가 이 경로를 옮기면(예: ~/.agy) 에러 없이 "컨테이너
      # 재생성 후 OAuth 재로그인 요구" 증상으로만 나타난다. 그때 컨테이너에서
      # agy를 한 번 실행한 직후 `find ~ -maxdepth 3 -mmin -2 -type d`로 새 앱
      # 디렉토리를 찾아 이 마운트를 그 경로로 바꿀 것 (2026-07-10 실측 방법).
      # 호스트에 디렉터리 필요: mkdir -p ~/.gemini
      - ${HOME}/.gemini:/home/dev/.gemini
      - ${HOME}/.npm:/home/dev/.npm
      # gh CLI 인증 영속화 (rebuild 후에도 gh auth 유지). 호스트에 디렉터리 필요:
      #   mkdir -p ~/.config/gh
      - ${HOME}/.config/gh:/home/dev/.config/gh
      # SSH 에이전트 포워딩 (GitHub 인증용)
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      # SSH 키 파일 마운트 (읽기 전용)
      - ${HOME}/.ssh:/home/dev/.ssh:ro
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - CLAUDE_CONFIG_DIR=/home/dev/.claude
      - PYTHON_GIL=0
    command: bash -lc "pre-commit install || true; bash"

  postgres:
    image: postgres:16
    profiles: [ "db" ]
    environment:
      POSTGRES_USER: ${PGUSER:-app}
      POSTGRES_PASSWORD: ${PGPASS:-app}
      POSTGRES_DB: ${PGDB:-app}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    profiles: [ "cache" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"

  jupyter:
    image: unidev-py:3.14-${PROJECT_NAME}
    profiles: [ "notebook" ]
    working_dir: /workspace/${PROJECT_NAME}
    command: bash -lc "python -m pip install jupyterlab && jupyter lab --ip=0.0.0.0
      --no-browser --NotebookApp.token=''"
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ../:/workspace/${PROJECT_NAME}

volumes:
  pgdata:
